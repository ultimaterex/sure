# Fast image build for a single branch.
#
# Unlike `publish.yml`, this workflow:
#   - runs automatically on every push to every branch, and can also be triggered
#     manually (workflow_dispatch) for any branch
#   - does NOT run the test/lint CI suite
#   - builds linux/amd64 ONLY (no arm64) — much faster
#   - tags the image with the slugified branch name, e.g.
#     `feat/mercury-credit-support` -> ghcr.io/<owner>/<repo>:feat-mercury-credit-support
#
# For push builds the workflow must exist on the branch being pushed (GitHub runs
# the workflow version from that commit). For manual runs, open
# Actions -> "Build branch image (x86)" -> Run workflow -> pick a branch.

name: Build branch image (x86)

on:
  push:
    branches:
      - '**'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build (image is tagged with its slugified name)'
        required: true
        type: string
        default: 'main'

# One in-flight build per branch: a newer push cancels the previous run.
concurrency:
  group: branch-image-${{ github.event.inputs.branch || github.ref_name }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build & push linux/amd64
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Check out the selected branch
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          # Manual runs build the requested branch; push builds the pushed one.
          ref: ${{ github.event.inputs.branch || github.ref_name }}
          persist-credentials: false

      - name: Compute image tag and commit SHA
        id: meta
        shell: bash
        env:
          BRANCH: ${{ github.event.inputs.branch || github.ref_name }}
        run: |
          SLUG="$(printf '%s' "$BRANCH" | sed -E 's#[^a-zA-Z0-9._-]+#-#g; s#^-+##; s#-+$##')"
          if [[ -z "$SLUG" ]]; then
            echo "::error::Could not derive a tag from branch '$BRANCH'"
            exit 1
          fi
          echo "tag=${SLUG}" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "Building ${BRANCH} -> ${REGISTRY}/${IMAGE_NAME}:${SLUG}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to the container registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push linux/amd64 image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          platforms: linux/amd64
          push: true
          build-args: BUILD_COMMIT_SHA=${{ steps.meta.outputs.sha }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
          # Read the main pipeline's warm cache (if any) plus this workflow's own,
          # and write to a separate ref so we never clobber the release cache.
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cache-branch-amd64
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cache-amd64
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cache-branch-amd64,mode=max
          provenance: false

      - name: Summary
        shell: bash
        run: |
          {
            echo "### Image pushed"
            echo ""
            echo '```'
            echo "docker pull ${REGISTRY}/${IMAGE_NAME}:${{ steps.meta.outputs.tag }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
